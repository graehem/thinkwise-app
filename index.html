<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThinkWise | Study Smarter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
    }

    p {
      color: #666;
      margin-bottom: 30px;
    }

    .btn-group {
      display: flex;
      gap: 15px;
    }

    .btn-group a button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background: #007bff;
      color: white;
      transition: background 0.3s;
    }

    .btn-group a button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <h1>Welcome to ThinkWise 👋</h1>
  <p>Your intelligent study companion</p>

  <div class="btn-group">
    <a href="pages/login.html"><button>Login</button></a>
    <a href="pages/signup.html"><button>Sign Up</button></a>
  </div>
</body>
</html>
